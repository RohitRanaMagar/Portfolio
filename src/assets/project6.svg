<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#1a0a2e"/>
  <!-- sidebar users -->
  <rect x="0" y="0" width="170" height="400" fill="#12071f"/>
  <text x="20" y="34" font-family="Arial" font-size="15" fill="#a78bfa" font-weight="bold">ChatApp</text>
  <rect x="15" y="50" width="140" height="30" rx="6" fill="#1e0f35"/>
  <text x="85" y="70" text-anchor="middle" font-family="Arial" font-size="11" fill="#64748b">Search...</text>
  <!-- users list -->
  <rect x="0" y="90" width="170" height="48" fill="#2d1b4e"/>
  <circle cx="30" cy="114" r="14" fill="#7c3aed"/>
  <text x="30" y="119" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">RK</text>
  <rect x="52" y="104" width="80" height="8" rx="2" fill="#4c2a8a"/>
  <rect x="52" y="120" width="60" height="6" rx="2" fill="#3d1f6e"/>
  <rect x="140" y="106" width="20" height="16" rx="8" fill="#7c3aed"/>
  <text x="150" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">3</text>
  <circle cx="30" cy="162" r="14" fill="#0891b2"/>
  <text x="30" y="167" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">AS</text>
  <rect x="52" y="152" width="80" height="8" rx="2" fill="#1e293b"/>
  <rect x="52" y="168" width="100" height="6" rx="2" fill="#1e293b"/>
  <circle cx="30" cy="210" r="14" fill="#059669"/>
  <text x="30" y="215" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">PM</text>
  <rect x="52" y="200" width="80" height="8" rx="2" fill="#1e293b"/>
  <rect x="52" y="216" width="100" height="6" rx="2" fill="#1e293b"/>
  <circle cx="30" cy="258" r="14" fill="#dc2626"/>
  <text x="30" y="263" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">NB</text>
  <rect x="52" y="248" width="80" height="8" rx="2" fill="#1e293b"/>
  <rect x="52" y="264" width="100" height="6" rx="2" fill="#1e293b"/>
  <!-- chat area -->
  <rect x="170" y="0" width="430" height="400" fill="#1a0a2e"/>
  <!-- chat header -->
  <rect x="170" y="0" width="430" height="50" fill="#12071f"/>
  <circle cx="200" cy="25" r="14" fill="#7c3aed"/>
  <text x="200" y="30" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">RK</text>
  <text x="225" y="20" font-family="Arial" font-size="13" fill="#e2e8f0" font-weight="bold">Raj Kumar</text>
  <text x="225" y="36" font-family="Arial" font-size="10" fill="#34d399">Online</text>
  <!-- messages -->
  <rect x="185" y="65" width="180" height="36" rx="12" rx="12" fill="#2d1b4e"/>
  <text x="200" y="86" font-family="Arial" font-size="11" fill="#e2e8f0">Hey! How are you?</text>
  <rect x="400" y="115" width="185" height="36" rx="12" fill="#7c3aed"/>
  <text x="415" y="136" font-family="Arial" font-size="11" fill="#fff">I'm good! Working on</text>
  <rect x="400" y="158" width="185" height="36" rx="12" fill="#7c3aed"/>
  <text x="415" y="179" font-family="Arial" font-size="11" fill="#fff">a React project 🚀</text>
  <rect x="185" y="208" width="200" height="36" rx="12" fill="#2d1b4e"/>
  <text x="200" y="229" font-family="Arial" font-size="11" fill="#e2e8f0">That sounds awesome!</text>
  <rect x="185" y="255" width="160" height="36" rx="12" fill="#2d1b4e"/>
  <text x="200" y="276" font-family="Arial" font-size="11" fill="#e2e8f0">Can I see it?</text>
  <rect x="400" y="305" width="175" height="36" rx="12" fill="#7c3aed"/>
  <text x="415" y="326" font-family="Arial" font-size="11" fill="#fff">Sure! I'll share soon</text>
  <!-- input -->
  <rect x="175" y="355" width="420" height="35" rx="20" fill="#12071f" stroke="#3d1f6e" stroke-width="1"/>
  <text x="200" y="377" font-family="Arial" font-size="11" fill="#334155">Type a message...</text>
  <circle cx="570" cy="372" r="14" fill="#7c3aed"/>
  <!-- label -->
  <rect x="170" y="370" width="430" height="30" fill="#12071f"/>
  <text x="385" y="390" text-anchor="middle" font-family="Arial" font-size="13" fill="#a78bfa" font-weight="bold">Real-time Chat App — Node.js + Socket.io</text>
</svg>
